      <!-- Inline skeleton — shown instantly before React loads -->

        #app-skeleton {
          min-height: 100vh;

        }

          background: rgba(255,255,255,0.70);
          border-radius: 24px;
          padding: 36px 28px;
          display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .sk-block {
          border-radius: 8px;
          background: rgba(124,58,237,0.12);
          animation: sk-pulse 1.4s ease-in-out infinite;
        }
        @keyframes sk-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }

          <div class="sk-block" style="width:100%;height:44px;border-radius:12px;margin-top:8px;"></div>
          <div class="sk-block" style="width:100%;height:44px;border-radius:12px;"></div>
          <div class="sk-block" style="width:100%;height:44px;border-radius:50px;margin-top:8px;"></div>
