<!DOCTYPE html>
<html lang="ta">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Health School – Diabetes Reversal Webinar</title>
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preload hero image — shown immediately on first paint -->
    <link rel="preload" href="/person.webp" as="image" type="image/webp" />

    <!-- Fonts: async (non-blocking) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Meta Pixel — Automatic Advanced Matching ON.
         Once initialized here, fbq is queued and React app calls it
         via apps/funnel/src/utils/pixel.js for every qualification
         step. The init() with `autoConfig: true` lets Meta extract
         email/phone/name from form fields automatically, and the
         per-event helpers also pass them explicitly for redundancy. -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      // Init with Automatic Advanced Matching — Meta hashes + matches
      // form fields (email, phone, name) without us doing PII handling.
      fbq('init', '1866739047322363', {}, { autoConfig: true });
      fbq('track', 'PageView');
    </script>
    <!-- noscript fallback intentionally omitted: this SPA does not
         render without JS, so a noscript pixel would never fire. -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;600;700&display=swap" /></noscript>
  </head>
  <body>
    <div id="root">
      <!-- Inline skeleton — shown instantly before React loads -->
      <style>
        #app-skeleton {
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #f3f0ff 0%, #ede9fe 100%);
          gap: 16px;
          padding: 24px;
        }
        .sk-logo {
          width: 80px; height: 80px; border-radius: 50%;
          background: rgba(124,58,237,0.15);
          animation: sk-pulse 1.4s ease-in-out infinite;
        }
        .sk-line {
          border-radius: 8px;
          background: rgba(124,58,237,0.12);
          animation: sk-pulse 1.4s ease-in-out infinite;
        }
        @keyframes sk-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }
      </style>
      <div id="app-skeleton">
        <div class="sk-logo"></div>
        <div class="sk-line" style="width:200px;height:20px;"></div>
        <div class="sk-line" style="width:260px;height:14px;margin-top:4px;"></div>
        <div class="sk-line" style="width:160px;height:14px;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
